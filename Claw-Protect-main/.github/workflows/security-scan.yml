name: Security Scan & Quality Gates

on:
  push:
    branches: [main, develop, 'copilot/**']
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Job 1: Static Application Security Testing (SAST)
  codeql-analysis:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: +security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:javascript"

  # Job 2: Dependency Vulnerability Scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Dependency Review (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: moderate

  # Job 3: Secret Scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.88.18
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # Job 4: Linting & Code Quality
  lint-and-format:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Check TypeScript types
        run: npx tsc --noEmit
        continue-on-error: false

  # Job 5: Build Test
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not created"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "Error: index.html not found in dist"
            exit 1
          fi
          echo "Build artifacts verified successfully"

  # Job 6: Security Policy Validation
  security-policy-check:
    name: Security Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check SECURITY.md exists
        run: |
          if [ ! -f "SECURITY.md" ]; then
            echo "Error: SECURITY.md not found"
            echo "A security policy is mandatory for production deployments"
            exit 1
          else
            echo "✓ SECURITY.md found"
          fi

      - name: Check security documentation
        run: |
          required_docs=("ARCHITECTURE.md" "QUICKSTART.md")
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "Error: Required documentation $doc not found"
              exit 1
            fi
            echo "✓ $doc found"
          done

  # Job 7: Firebase Security Rules Validation
  firebase-rules-check:
    name: Firebase Rules Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Validate Firestore Rules
        run: |
          if [ -f "firestore.rules" ]; then
            echo "✓ firestore.rules found"
            echo "Compiling Firestore rules with firebase-tools..."
            printf '{"firestore":{"rules":"firestore.rules"},"emulators":{"firestore":{"port":8080}}}\n' > firebase.json
            firebase emulators:exec --only firestore --project demo-ci "echo '✓ Firestore rules syntax valid'"
          else
            echo "Warning: firestore.rules not found"
          fi

  # Security Gate: All checks must pass
  security-gate:
    name: Security Gate ✓
    runs-on: ubuntu-latest
    needs: 
      - codeql-analysis
      - dependency-scan
      - secret-scan
      - lint-and-format
      - build-test
      - security-policy-check
      - firebase-rules-check
    
    steps:
      - name: Security Gate Passed
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  ✓ All security checks passed"
          echo "  ✓ CodeQL SAST: Passed"
          echo "  ✓ Dependency Scan: Passed"
          echo "  ✓ Secret Scan: Passed"
          echo "  ✓ Lint & Quality: Passed"
          echo "  ✓ Build Test: Passed"
          echo "  ✓ Security Policies: Validated"
          echo "  ✓ Firebase Rules: Validated"
          echo "════════════════════════════════════════════════════════"
          echo "Ready for deployment ✓"
